# Render blueprint for the API service.
# The frontend deploys to Vercel separately (see vercel.json + README).
services:
  - type: web
    name: http-monitor-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: MONGO_URL
        sync: false # set to your MongoDB Atlas connection string
      - key: CORS_ORIGIN
        sync: false # set to your Vercel frontend URL
      - key: ANTHROPIC_API_KEY
        sync: false # optional; omit to run LLM features in fallback mode
      - key: POLL_CRON
        value: "*/5 * * * *"
      - key: LLM_MODEL
        value: claude-haiku-4-5-20251001
      - key: LLM_MAX_CALLS_PER_HOUR
        value: 20
